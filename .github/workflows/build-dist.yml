name: Build Dist

on:
  push:
    branches:
      - development
  pull_request_target:
    types: [closed]
    branches:
      - main

concurrency:
  group: build-dist-${{ github.base_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-dist:
    if: |
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'push' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.base_ref || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify build env
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY. Set repository secrets or vars."
            exit 1
          fi

      - name: Write build env
        run: |
          cat > .env.production << EOF
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Clean dist
        run: rm -rf dist

      - name: Cache emoji assets
        uses: actions/cache@v4
        with:
          path: public/emoji
          key: emoji-assets-${{ hashFiles('scripts/sync-twemoji.mjs') }}

      - name: Sync emoji assets
        run: npm run sync:emoji

      - name: Build
        run: npm run build

      - name: Verify dist contains Supabase URL
        run: |
          if ! grep -R "${VITE_SUPABASE_URL}" dist/assets >/dev/null; then
            echo "Supabase URL not found in dist output."
            exit 1
          fi

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -f dist
          if git diff --staged --quiet; then
            echo "No dist changes to commit."
            exit 0
          fi
          git commit -m "chore(dist): update build output [skip ci]"
          git push origin ${{ github.base_ref || github.ref_name }}
