name: Build Dist

on:
  workflow_dispatch: # push trigger paused while testing hoster build

concurrency:
  group: build-dist-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-dist:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset to origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify build env
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY. Set repository secrets or vars."
            exit 1
          fi

      - name: Write build env
        run: |
          cat > .env.production << EOF
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Clean dist
        run: rm -rf dist

      - name: Build
        run: npm run build

      - name: Verify dist contains Supabase URL
        run: |
          if ! grep -R "${VITE_SUPABASE_URL}" dist/assets >/dev/null; then
            echo "Supabase URL not found in dist output."
            exit 1
          fi

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -f dist
          if git diff --staged --quiet; then
            echo "No dist changes to commit."
            exit 0
          fi
          git commit -m "chore(dist): update build output [skip ci]"
          git push